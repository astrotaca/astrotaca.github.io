<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Astrotaca - 20 year old Student & Astrophotographer">
    <title>Astrotaca - Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700;900&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-mode">

    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="sidebar-container"></div>

    <main class="main-content">

        <nav class="top-nav">
            <button id="sidebar-toggle" class="sidebar-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <section class="content-section active">

            <div class="container">

                <header class="section-header">
                    <h1>Latest Images</h1>
                    <div class="tags">
                        <span class="tag active" data-filter="all">All</span>
                        <span class="tag" data-filter="nebulae">Nebulae</span>
                        <span class="tag" data-filter="galaxies">Galaxies</span>
                        <span class="tag" data-filter="comets">Comets</span>
                        <span class="tag" data-filter="widefield">Wide Field</span>
                    </div>
                </header>

                <div class="gallery-grid" id="home-gallery"></div>

                <div class="home-view-all">
                    <a href="gallery.html" class="btn-link">View All Images →</a>
                </div>

                <header class="section-header home-section-gap">
                    <h1>Latest Guides</h1>
                    <div class="tags">
                        <span class="tag active" data-filter="all">All Guides</span>
                        <span class="tag" data-filter="advanced">Advanced</span>
                        <span class="tag" data-filter="basics">Basics</span>
                    </div>
                </header>

                <div class="gallery-grid" id="home-guides"></div>

                <div class="home-view-all">
                    <a href="guides.html" class="btn-link">View All Guides →</a>
                </div>

            </div>

        </section>

    </main>

    <script src="gallery-data.js"></script>
    <script src="guides-data.js"></script>
    <script src="sidebar.js"></script>
    <script src="gallery-filter.js"></script>
    <script src="load-sidebar.js"></script>

    <script>
        const homeGallery = document.getElementById('home-gallery');
        if (homeGallery) {
            homeGallery.innerHTML = galleryImages.slice(0, 4).map(item => `
                <a href="${item.link}" class="gallery-item" data-category="${item.categories.join(' ')}">
                    <img src="${item.image}" alt="${item.alt}" class="gallery-image">
                    <div class="gallery-info">
                        <h3>${item.title}</h3>
                        <p>${item.filters} · ${item.duration} · ${item.categories[0]}</p>
                    </div>
                </a>
            `).join('');

            homeGallery.querySelectorAll('.gallery-image').forEach(img => {
                if (img.complete) img.classList.add('loaded');
                else img.addEventListener('load', () => img.classList.add('loaded'));
            });
        }

    const homeGuides = document.getElementById('home-guides');
    if (homeGuides) {
        homeGuides.innerHTML = guidesData.slice(0, 4).map(guide => `
            <a href="${guide.link}" class="guide-card" data-category="${guide.category}">
                <img src="${guide.image}" alt="${guide.title}" class="guide-image">
                <div class="guide-content">
                    <h3>${guide.title}</h3>
                    <p>${guide.shortDescription}</p>
                </div>
            </a>
        `).join('');

            homeGuides.querySelectorAll('.guide-image').forEach(img => {
                if (img.complete) img.classList.add('loaded');
                else img.addEventListener('load', () => img.classList.add('loaded'));
            });
        }
    </script>

</body>
</html>
