<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Astrotaca - Gallery of Astrophotography">
    <title>Astrotaca - Gallery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700;900&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-mode">

    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="sidebar-container"></div>

    <main class="main-content">

        <nav class="top-nav">
            <button id="sidebar-toggle" class="sidebar-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <section class="content-section active">

            <div class="container">

                <header class="section-header">
                    <h1>Gallery</h1>

                    <div class="tags">
                        <span class="tag active" data-filter="all">All</span>
                        <span class="tag" data-filter="nebulae">Nebulae</span>
                        <span class="tag" data-filter="galaxies">Galaxies</span>
                        <span class="tag" data-filter="comets">Comets</span>
                        <span class="tag" data-filter="widefield">Wide Field</span>
                    </div>

                </header>

                <!-- Gallery grid populated by gallery-data.js -->
                <div class="gallery-grid"></div>

            </div>

        </section>

    </main>

    <script src="gallery-data.js"></script>
    <script src="sidebar.js"></script>
    <script src="gallery-filter.js"></script>
    <script src="load-sidebar.js"></script>

</body>
</html>
